<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mantenimiento de Personal</title>
    <meta name="api-url" content="http://localhost:3000" />
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
  </head>
  <body>
    <main class="layout">
      <section class="panel form-panel">
        <h1>Mantenimiento de Personal</h1>

        <form id="personalForm">
          <input type="hidden" id="id" />

          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" required />

          <label for="apellido">Apellido</label>
          <input type="text" id="apellido" required />

          <label for="cargo">Cargo</label>
          <input type="text" id="cargo" required />

          <label for="email">Email</label>
          <input type="email" id="email" required />

          <label for="telefono">Teléfono</label>
          <input type="text" id="telefono" />

          <div class="actions">
            <button type="submit" id="submitBtn">Guardar</button>
            <button type="button" id="cancelBtn" class="secondary">Cancelar</button>
          </div>
        </form>
      </section>

      <section class="panel list-panel">
        <h2>Personal Registrado</h2>
        <div id="message" class="message"></div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Nombre Completo</th>
                <th>Cargo</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="personalTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
